<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekoa Computers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fff;
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            font-family: sans-serif;
        }

        .left {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }

        .left header {
            margin-bottom: 1.5rem;
        }

        .left header img {
            display: block;
            width: min(153px, 100%);
            height: auto;
            margin: 0 auto;
        }

        nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            display: block;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        nav a:hover {
            border-color: #888;
            transform: translateY(-4px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        }

        nav a img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .right {
            width: 50%;
            display: flex;
            align-items: stretch;
        }

        .right img {
            display: block;
            width: 100%;
            height: 100vh;
            object-fit: cover;
            object-position: top;
        }
    </style>
</head>
<body>
    <div class="left">
        <header>
            <a href="https://he.wikipedia.org/wiki/%D7%AA%D7%A7%D7%95%D7%A2_%D7%9E%D7%97%D7%A9%D7%91%D7%99%D7%9D">
                <img src="main_site_assets/logo_optimized.gif" alt="Tekoa Computers">
            </a>
        </header>
        <nav>
            <a href="Tirgolit_site/index.html">
                <img src="main_site_assets/Tirgolit.gif" alt="Tirgolit Site">
            </a>
            <a href="https://www.old-games.org/misc/peledor/">
                <img src="main_site_assets/Peledor.gif" alt="Peledor">
            </a>
        </nav>
    </div>

    <div class="right">
        <img src="main_site_assets/מרדכי.jpg" alt="מרדכי">
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תקוע מחשבים — Tekoa Computers</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            /* Sky gradient sampled from banner.jpg dominant tones:
               #E3EEF5 (near-white) → #B2D8F2 (medium sky) → #82B7DC (deeper). */
            background: linear-gradient(180deg, #E3EEF5 0%, #B2D8F2 45%, #82B7DC 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: "Arial Hebrew", "Heebo", "Segoe UI", Arial, sans-serif;
            color: #1d3a52;
            line-height: 1.4;
        }
        .banner-row {
            display: flex;
            justify-content: center;
            padding: 0.75rem 0.75rem 0;
        }
        .banner-link {
            display: block;
            line-height: 0;
            width: 30vw;             /* ~30% of viewport width */
            min-width: 260px;
            max-width: 560px;
        }
        .banner-link img {
            display: block;
            width: 100%;
            height: auto;            /* aspect 1893×542 ≈ 3.5:1 preserved */
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 1.5rem 0 1rem;
            color: #154069;
            border-bottom: 2px solid rgba(21, 64, 105, 0.35);
            padding-bottom: 0.4rem;
            text-align: right;
        }
        h2:first-of-type { margin-top: 0; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 12px;
            padding: 0.85rem 0.6rem 1rem;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 2px 8px rgba(21, 64, 105, 0.12);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-4px);
            background: #fff;
            box-shadow: 0 8px 22px rgba(21, 64, 105, 0.25);
            border-color: #4a90c2;
        }
        .card-icon {
            width: 110px;
            height: 82px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 0.6rem;
            background: #DBEFFB;
            border: 1px solid rgba(74, 144, 194, 0.4);
        }
        .card-title {
            font-size: 0.98rem;
            font-weight: 600;
            text-align: center;
            color: #1d3a52;
        }
        /* Tirgolit / Peledor GIFs have transparent regions and need
           object-fit:contain rather than cover so they don't get
           awkwardly cropped like the Kesem-app thumbnails. */
        .card[href*="Tirgolit_site"] .card-icon,
        .card[href*="old-games.org"]  .card-icon {
            object-fit: contain;
            background: #fff;
        }
    </style>
</head>

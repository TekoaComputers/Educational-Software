<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תקוע מחשבים — התקדמות</title>
    <link rel="icon" type="image/svg+xml" href="main_site_assets/favicon.svg">
    <style>
        :root {
            --good: #5cb85c;
            --warn: #f0ad4e;
            --bad:  #d9534f;
            --accent: #4a90c2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, #E3EEF5 0%, #B2D8F2 45%, #82B7DC 100%);
            background-attachment: fixed;
            color: #1d3a52;
            font-family: "Arial Hebrew", "Heebo", "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            line-height: 1.4;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(74, 144, 194, 0.25);
            backdrop-filter: blur(4px);
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 700; color: #1d3a52; }
        header h1 a { color: inherit; text-decoration: none; }
        .auth-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .auth-row button {
            background: var(--accent); color: #fff;
            border: 0; padding: 7px 14px; border-radius: 14px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .auth-row button:disabled { opacity: 0.4; cursor: not-allowed; }
        .auth-row .signed-out { color: #4a5d72; }
        main {
            max-width: 960px; margin: 0 auto; padding: 24px 22px 40px;
        }
        h2 { font-size: 24px; font-weight: 700; margin: 0 0 6px 0; color: #1d3a52; }
        .app-header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 12px;
        }
        .app-header .icon {
            width: 96px; height: 72px;
            object-fit: cover; object-position: center;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(21, 64, 105, 0.22);
            background: #DBEFFB;
            border: 1px solid rgba(74, 144, 194, 0.4);
            flex: 0 0 auto;
        }
        .app-header h2 { margin: 0; }
        .app-header .icon.icon-contain {
            object-fit: contain;
            background: #fff;
        }
        .sub {
            color: #4a5d72; font-size: 13px; margin-bottom: 18px;
        }
        /* Same animated-gradient bar as the catalog. */
        .bar-wrap {
            position: relative;
            width: 100%;
            margin-bottom: 28px;
        }
        .bar {
            position: relative;
            width: 100%;
            height: 22px;
            border-radius: 11px;
            background: rgba(74, 144, 194, 0.18);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .bar-fill {
            height: 100%; width: 0;
            border-radius: 11px;
            background: linear-gradient(100deg,
                #5cb85c 0%, #7ed87e 25%, #4a90c2 50%, #7ed87e 75%, #5cb85c 100%);
            background-size: 300% 100%;
            animation: progress-shimmer 50s linear infinite;
            transition: width 0.5s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        @keyframes progress-shimmer {
            0%   { background-position:   0% 50%; }
            100% { background-position: 300% 50%; }
        }
        .bar-pct {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: #1d3a52;
            text-shadow: 0 1px 0 rgba(255,255,255,0.55);
            pointer-events: none;
        }
        table {
            width: 100%; border-collapse: collapse;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(21, 64, 105, 0.12);
            backdrop-filter: blur(2px);
        }
        thead th {
            text-align: right; font-weight: 700; font-size: 13px;
            padding: 11px 14px; background: rgba(74, 144, 194, 0.18);
            border-bottom: 1px solid rgba(74, 144, 194, 0.25);
            color: #1d3a52;
        }
        tbody td { padding: 10px 14px; border-bottom: 1px solid rgba(74, 144, 194, 0.18); font-size: 14px; }
        tbody tr:nth-child(even) { background: rgba(74, 144, 194, 0.06); }
        tbody tr.unvisited td { color: #6c8aa3; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .b-good { background: rgba(92,184,92,0.25); color: #2c6a2c; }
        .b-warn { background: rgba(240,173,78,0.25); color: #8a5a14; }
        .b-bad  { background: rgba(217,83,79,0.25); color: #842422; }
        .b-none { background: rgba(74, 144, 194, 0.15); color: #6c8aa3; }
        .score-cell { display: inline-flex; gap: 6px; }
        .empty {
            text-align: center; padding: 40px 20px;
            color: #4a5d72; font-size: 14px;
        }
        .actions {
            display: flex; justify-content: flex-end;
            margin-top: 16px;
        }
        .actions button {
            background: rgba(255, 255, 255, 0.7);
            color: #4a5d72;
            border: 1px solid rgba(74, 144, 194, 0.4);
            padding: 7px 14px; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .actions button:hover {
            color: var(--bad); border-color: var(--bad);
            background: rgba(255,255,255,0.95);
        }
        .grid-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .summary-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(2px);
            padding: 14px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(21, 64, 105, 0.12);
            border: 2px solid transparent;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            text-decoration: none; color: inherit;
            display: block;
        }
        .summary-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(21, 64, 105, 0.22);
            border-color: var(--accent);
            background: #fff;
        }
        .summary-card .head {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .summary-card .icon {
            width: 56px; height: 42px;
            object-fit: cover; object-position: center;
            border-radius: 6px;
            background: #DBEFFB;
            border: 1px solid rgba(74, 144, 194, 0.3);
            flex: 0 0 auto;
        }
        .summary-card .icon.icon-contain { object-fit: contain; background: #fff; }
        .summary-card .name {
            font-weight: 700; font-size: 0.98rem; color: #1d3a52;
        }
        .summary-card .bar { height: 16px; margin-bottom: 6px; border-radius: 8px; }
        .summary-card .bar-fill { border-radius: 8px; }
        .summary-card .pct {
            font-size: 12px; color: #4a5d72; font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <h1><a href="index.html">← תקוע מחשבים</a></h1>
    <div class="auth-row">
        <span id="user-info" class="signed-out">לא מחובר</span>
        <button id="sign-in-btn" disabled>התחבר עם גוגל</button>
        <button id="sign-out-btn" style="display:none">התנתק</button>
    </div>
</header>

<main id="root">
    <p class="empty">טוען…</p>
</main>

<script src="main_site_assets/progress.js"></script>
<script src="main_site_assets/feedback.js"></script>
<script src="main_site_assets/trace.js"></script>
<script>window.Tekoa && Tekoa.setApp("index");</script>
<script>
(function () {
    const APP_TITLES = {
        Brahot: "ברכות", Hagim: "חגי ישראל", Yeled: "ילד יהודי", Dvash: "מן הפרח אל הדבש",
        Shabat: "שבת", Heshbon: "חשבון 1+", Ivrit: "עברית", EnglishA: "English-A",
        EnglishB: "English-B", EnglishC: "English-C", KolKoreA: "קול קורא-א",
        KolKoreB: "קול קורא-ב", KolKoreC: "קול קורא-ג", KolKoreD: "קול קורא-ד",
        Shirim: "שירים", "Shirim&Meshalim": "שירים ומשלים", Kesem: "קסם",
        Hemed: "צמד חמד", Nivim: "ניבים ופתגמים", Makhela: "מקהלה", Mikraot: "מקראות",
        Tirgolit: "תרגולית", Tirgolit2: "תרגולית 2",
    };
    const APP_HREFS = {
        Brahot:   "Kesem_site/index.html#/Brahot",
        Hagim:    "Kesem_site/index.html#/Hagim",
        Yeled:    "Kesem_site/index.html#/Yeled",
        Dvash:    "Kesem_site/index.html#/Dvash",
        Shabat:   "Kesem_site/index.html#/Shabat",
        Heshbon:  "Kesem_site/index.html#/Heshbon",
        Ivrit:    "Kesem_site/index.html#/Ivrit",
        EnglishA: "Kesem_site/index.html#/EnglishA",
        EnglishB: "Kesem_site/index.html#/EnglishB",
        EnglishC: "Kesem_site/index.html#/EnglishC",
        KolKoreA: "Kesem_site/index.html#/KolKoreA",
        KolKoreB: "Kesem_site/index.html#/KolKoreB",
        KolKoreC: "Kesem_site/index.html#/KolKoreC",
        KolKoreD: "Kesem_site/index.html#/KolKoreD",
        Shirim:   "Kesem_site/index.html#/Shirim",
        "Shirim&Meshalim": "Kesem_site/index.html#/Shirim&Meshalim",
        Kesem:    "Kesem_site/index.html#/Kesem",
        Hemed:    "hemed_nivim_site/index.html#/Hemed",
        Nivim:    "hemed_nivim_site/index.html#/Nivim",
        Makhela:  "makhela_site/index.html",
        Mikraot:  "Mikraot_site/index.html",
        Tirgolit: "Tirgolit_site/index.html",
        Tirgolit2:"Tirgolit_site/index.html",
    };

    // Icon filename per app — all live in main_site_assets/ at the repo root.
    // Tirgolit is the only one that's a .gif; Tirgolit2 reuses the Tirgolit gif.
    const APP_ICONS = {
        Brahot:"Brahot.jpg", Hagim:"Hagim.jpg", Yeled:"Yeled.jpg", Dvash:"Dvash.jpg",
        Shabat:"Shabat.jpg", Heshbon:"Heshbon.jpg", Ivrit:"Ivrit.jpg",
        EnglishA:"EnglishA.jpg", EnglishB:"EnglishB.jpg", EnglishC:"EnglishC.jpg",
        KolKoreA:"KolKoreA.jpg", KolKoreB:"KolKoreB.jpg", KolKoreC:"KolKoreC.jpg", KolKoreD:"KolKoreD.jpg",
        Shirim:"Shirim.jpg", "Shirim&Meshalim":"Shirim&Meshalim.jpg", Kesem:"Kesem.jpg",
        Hemed:"Hemed.jpg", Nivim:"Nivim.jpg", Makhela:"Makhela.jpg", Mikraot:"Mikraot.jpg",
        Tirgolit:"Tirgolit.gif", Tirgolit2:"Tirgolit.gif",
    };
    function iconFor(appId) {
        const f = APP_ICONS[appId];
        if (!f) return null;
        return { src: "main_site_assets/" + f, contain: f.endsWith(".gif") };
    }

    const params = new URLSearchParams(location.search);
    const target = params.get("app");
    const root = document.getElementById("root");
    const P = window.Tekoa && window.Tekoa.Progress;

    function fmtScore(score) {
        if (!score) return '<span class="badge b-none">—</span>';
        if (typeof score === "object" && ("g" in score || "y" in score || "r" in score)) {
            // Kesem-style nikod: green / yellow / red marker counts.
            const g = score.g || 0, y = score.y || 0, r = score.r || 0;
            return `<span class="score-cell">
                <span class="badge b-good">${g}</span>
                <span class="badge b-warn">${y}</span>
                <span class="badge b-bad">${r}</span>
            </span>`;
        }
        if (typeof score === "object" && "correct" in score && "total" in score) {
            const pct = score.total ? Math.round(score.correct / score.total * 100) : 0;
            const cls = pct >= 80 ? "b-good" : pct >= 50 ? "b-warn" : "b-bad";
            return `<span class="badge ${cls}">${score.correct}/${score.total}</span>`;
        }
        if (typeof score === "number") {
            return `<span class="badge b-good">${score}</span>`;
        }
        return `<span class="badge b-none">${escapeHtml(JSON.stringify(score))}</span>`;
    }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function renderApp(appId) {
        const data = P.getApp(appId);
        const pct  = P.getPercent(appId);
        const title = APP_TITLES[appId] || appId;
        const visited = Object.values(data.activities).filter(a => a.visited).length;

        const rows = Object.keys(data.activities).sort().map(id => {
            const a = data.activities[id];
            const dispScore = (appId === "Makhela") ? "" : fmtScore(a.score);
            const visitedCell = a.visited
                ? `<span class="badge b-good">בוצע</span>`
                : `<span class="badge b-none">לא בוצע</span>`;
            return `<tr class="${a.visited ? '' : 'unvisited'}">
                <td>${escapeHtml(id)}</td>
                <td>${visitedCell}</td>
                ${appId === "Makhela" ? "" : `<td>${dispScore}</td>`}
            </tr>`;
        }).join("");
        const tableHead = appId === "Makhela"
            ? `<tr><th>פעילות</th><th>סטטוס</th></tr>`
            : `<tr><th>פעילות</th><th>סטטוס</th><th>ציון</th></tr>`;

        const icon = iconFor(appId);
        const iconHtml = icon
            ? `<img class="icon ${icon.contain ? 'icon-contain' : ''}" src="${icon.src}" alt="">`
            : "";
        root.innerHTML = `
            <div class="app-header">
                ${iconHtml}
                <h2>${escapeHtml(title)}</h2>
            </div>
            <div class="sub">
                <a href="${APP_HREFS[appId] || 'index.html'}">פתח לומדה ↗</a>
                · ${visited} מתוך ${data.total || "?"} פעילויות
            </div>
            <div class="bar-wrap">
                <div class="bar">
                    <div class="bar-fill" style="width:${pct}%"></div>
                    <span class="bar-pct">${pct}%</span>
                </div>
            </div>
            ${rows ? `<table><thead>${tableHead}</thead><tbody>${rows}</tbody></table>`
                   : `<p class="empty">עדיין אין פעילויות שהתחילת. פתח את הלומדה כדי שההתקדמות תתחיל להירשם.</p>`}
            <div class="actions">
                <button onclick="if(confirm('למחוק את ההתקדמות של ${escapeHtml(title)}?')){Tekoa.Progress.reset('${appId}');location.reload();}">אפס נתוני לומדה</button>
            </div>
        `;
    }

    function renderSummary() {
        const all = P.getAll();
        const apps = Object.keys(APP_TITLES);
        const cards = apps.map(appId => {
            const pct = P.getPercent(appId);
            const data = all[appId] || { total: 0 };
            const visited = data.activities ? Object.values(data.activities).filter(a => a.visited).length : 0;
            const icon = iconFor(appId);
            const iconHtml = icon
                ? `<img class="icon ${icon.contain ? 'icon-contain' : ''}" src="${icon.src}" alt="">`
                : "";
            return `<a class="summary-card" href="progress.html?app=${encodeURIComponent(appId)}">
                <div class="head">
                    ${iconHtml}
                    <div class="name">${escapeHtml(APP_TITLES[appId])}</div>
                </div>
                <div class="bar">
                    <div class="bar-fill" style="width:${pct}%"></div>
                    <span class="bar-pct">${pct}%</span>
                </div>
                <div class="pct">${visited}/${data.total || "?"} פעילויות</div>
            </a>`;
        }).join("");
        root.innerHTML = `
            <h2>סיכום התקדמות</h2>
            <div class="sub">לחץ על לומדה כדי לראות פירוט פעילויות וציונים.</div>
            <div class="grid-summary">${cards}</div>
        `;
    }

    function render() {
        if (target) renderApp(target);
        else renderSummary();
        renderAuth();
    }

    function renderAuth() {
        const user = P.getUser();
        const info = document.getElementById("user-info");
        const inBtn = document.getElementById("sign-in-btn");
        const outBtn = document.getElementById("sign-out-btn");
        if (P.isCloudEnabled()) {
            inBtn.disabled = false;
            inBtn.title = "סנכרון בין מכשירים דרך Google Drive";
        } else {
            inBtn.disabled = true;
            inBtn.title = "סנכרון לענן לא הוגדר (יש להגדיר Google OAuth Client ID ב-progress.js)";
        }
        if (user) {
            info.textContent = "מחובר: " + (user.email || user.name || "משתמש");
            info.classList.remove("signed-out");
            inBtn.style.display  = "none";
            outBtn.style.display = "";
        } else {
            info.textContent = "לא מחובר";
            info.classList.add("signed-out");
            inBtn.style.display  = "";
            outBtn.style.display = "none";
        }
    }

    document.getElementById("sign-in-btn").addEventListener("click", async () => {
        try { await P.signIn(); }
        catch (e) { alert("שגיאת התחברות: " + (e.message || e)); }
        render();
    });
    document.getElementById("sign-out-btn").addEventListener("click", () => {
        P.signOut();
        render();
    });

    window.addEventListener("tekoa-progress-change", render);
    render();
})();
</script>
</body>
</html>

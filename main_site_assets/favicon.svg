<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
    <!-- Tekoa Computers favicon: rounded-square tile with sky-to-leaf
         gradient matching the catalog theme, a soft inner highlight, and
         the Hebrew letter ת (tav, first letter of "Tekoa") in white. -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#5db1e0"/>
            <stop offset="55%"  stop-color="#4a90c2"/>
            <stop offset="100%" stop-color="#5cb85c"/>
        </linearGradient>
        <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
            <stop offset="45%"  stop-color="#ffffff" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- Tile -->
    <rect x="2" y="2" width="60" height="60" rx="13" ry="13" fill="url(#bg)"/>

    <!-- Soft top highlight -->
    <rect x="2" y="2" width="60" height="30" rx="13" ry="13" fill="url(#gloss)"/>

    <!-- Hebrew ת -->
    <text x="32" y="48"
          text-anchor="middle"
          font-family="'Arial Hebrew', 'Heebo', 'David', serif"
          font-size="44"
          font-weight="700"
          fill="#ffffff"
          style="paint-order: stroke; stroke: rgba(0,0,0,0.18); stroke-width: 1.2px;">ת</text>
</svg>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kesem</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="../main_site_assets/favicon.svg">
    <script src="../main_site_assets/audio_format.js"></script>
    <script src="../main_site_assets/progress.js"></script>
    <script src="../main_site_assets/feedback.js"></script>
    <script src="../main_site_assets/trace.js"></script>
    <script src="../main_site_assets/ui_editor.js"></script>
    <!-- Deep-link no-flash: if the URL already names an app (#/Brahot, etc.)
         hide the selector + heading before first paint so the user sees the
         deep-linked app directly. Without this, the static <h1>+nav.app-grid
         below paints for ~50-200ms before kesem.bundle.js runs showApp() and
         hides them. The bundle's showSelector() removes this attribute when
         the user navigates back to the selector. -->
    <script>
        if (location.hash && /^#\//.test(location.hash)) {
            document.documentElement.dataset.kesemDeeplink = "1";
        }
    </script>
    <style>
        html[data-kesem-deeplink] main h1,
        html[data-kesem-deeplink] .app-grid { display: none; }
        html[data-kesem-deeplink] body { background: #000; overflow: hidden; }
        html[data-kesem-deeplink] main { max-width: none; padding: 0; height: 100vh; }
    </style>
</head>
<body>
    <main>
        <h1>Kesem</h1>
        <nav class="app-grid">
            <a class="app-tile" href="#/Brahot" data-app="Brahot">
                <img src="assets/common/icons/Brahot.ico" alt="Brahot">
                <span>Brahot</span>
            </a>
            <a class="app-tile" href="#/Hagim" data-app="Hagim">
                <img src="assets/common/icons/Hagim.ico" alt="Hagim">
                <span>Hagim</span>
            </a>
            <a class="app-tile" href="#/Yeled" data-app="Yeled">
                <img src="assets/common/icons/Yeled.ico" alt="Yeled">
                <span>Yeled</span>
            </a>
            <a class="app-tile" href="#/Dvash" data-app="Dvash">
                <img src="assets/common/icons/Dvash.ico" alt="Dvash">
                <span>Dvash</span>
            </a>
        </nav>
        <div id="app-root"></div>
    </main>
    <script src="kesem.bundle.js"></script>
</body>
</html>
